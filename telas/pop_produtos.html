<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../img/claw.ico" type="image/x-icon">
    <title>Urban Claws</title>
</head>
<body>
    <div class="pop-prod">
        <h1 id="nome-produto"></h1>
        <img id="img-produto" src="">
        <p id="desc-produto"></p>

        <!--Captura os dados do produto-->
        <script>
            function capturaDados(dado){
                urlParams = new URLSearchParams(window.location.search)
                return urlParams.get(dado);
            }

            // Preenche o nome do produto
            document.getElementById("nome-produto").textContent=capturaDados("produto");
            // Preenche a imagem do produto
            document.getElementById("img-produto").src=capturaDados("imagem");
            // Preenche a descrição do produto
            document.getElementById("desc-produto").textContent=capturaDados("descricao");
        </script>
    </div>
</body>
</html>
